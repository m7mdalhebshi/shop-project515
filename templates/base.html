<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}موقعي{% endblock %}</title>

</head>

<body>
    <header>
        <h1 style="text-align: center;">مرحباً بك في متجري </h1>
    </header>
    <nav style="text-align: center;">
        <a href="/">الرئيسية</a>
        <a href="/product/">المنتجات</a>
        <a href="/customers/home/">العملاء</a>
        <a href="/delivery/home/">التوصيل</a>
        <a href="/about/">من نحن</a>
        |
        {% if user.is_authenticated %}
            مرحباً {{ user.username }}
            <form method="post" action="{% url 'logout' %}" style="display: inline;">
                {% csrf_token %}
                <button type="submit" style="background: none; border: none; color: blue; cursor: pointer; text-decoration: underline;">تسجيل خروج</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">تسجيل دخول</a>
        {% endif %}
    </nav>
    <main>
        {% block content %}
        {% endblock content %}
    </main>

</body>

</html>
